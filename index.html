<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>成人亲密关系依恋类型测试</title>
  <style>
    :root {
      --bg: #f6f4ef;
      --surface: #ffffff;
      --surface-soft: #faf8f3;
      --text: #25231f;
      --muted: #6f6a61;
      --line: #ded8cb;
      --accent: #2563eb;
      --accent-light: #dbeafe;
      --accent-soft: #eff6ff;
      --accent-dark: #1d4ed8;
      --accent-border: #93c5fd;
      --accent-text: #1e3a8a;
      --primary: var(--accent);
      --primary-dark: var(--accent-dark);
      --primary-soft: var(--accent-soft);
      --warning: #9d5d21;
      --danger: #a84a42;
      --shadow: 0 18px 50px rgba(43, 38, 28, 0.08);
      --radius: 8px;
      --max-width: 1040px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      color: var(--text);
      background:
        linear-gradient(180deg, rgba(246, 244, 239, 0.7), rgba(246, 244, 239, 1)),
        var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      line-height: 1.65;
    }

    button,
    input {
      font: inherit;
    }

    .page {
      min-height: 100vh;
      padding-bottom: 104px;
    }

    .container {
      width: min(100% - 32px, var(--max-width));
      margin: 0 auto;
    }

    .hero {
      padding: 48px 0 26px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 12px;
      color: var(--primary-dark);
      font-size: 0.92rem;
      font-weight: 700;
    }

    .eyebrow::before {
      content: "";
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--primary);
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 3.9rem);
      line-height: 1.12;
      letter-spacing: 0;
    }

    .subtitle {
      max-width: 760px;
      margin: 16px 0 0;
      color: var(--muted);
      font-size: 1.06rem;
    }

    .notice {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 24px;
    }

    .notice-item {
      padding: 16px 18px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.72);
    }

    .notice-item strong {
      display: block;
      margin-bottom: 4px;
      color: var(--primary-dark);
    }

    .section-heading {
      margin: 38px 0 16px;
      padding-top: 8px;
      border-top: 1px solid var(--line);
    }

    .section-heading h2 {
      margin: 0;
      font-size: 1.42rem;
      line-height: 1.35;
    }

    .section-heading p {
      margin: 6px 0 0;
      color: var(--muted);
    }

    .question-card,
    .report-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: 0 10px 26px rgba(43, 38, 28, 0.04);
    }

    .question-card {
      margin: 14px 0;
      padding: 20px;
      scroll-margin-top: 18px;
    }

    .question-card.is-missing {
      border-color: var(--danger);
      box-shadow: 0 0 0 3px rgba(168, 74, 66, 0.12);
    }

    .question-title {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 14px;
    }

    .question-number {
      flex: 0 0 auto;
      min-width: 42px;
      padding: 4px 8px;
      border-radius: 999px;
      color: var(--primary-dark);
      background: var(--primary-soft);
      text-align: center;
      font-size: 0.88rem;
      font-weight: 800;
    }

    .question-text {
      margin: 0;
      font-weight: 700;
      line-height: 1.58;
    }

    .question-context {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .options {
      display: grid;
      gap: 10px;
    }

    .options.likert {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .option {
      position: relative;
      display: flex;
      gap: 10px;
      align-items: flex-start;
      width: 100%;
      min-height: 48px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: var(--text);
      background: var(--surface-soft);
      text-align: left;
      cursor: pointer;
      transition: border-color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
    }

    .option:hover {
      border-color: var(--accent-border);
      background: #fff;
      transform: translateY(-1px);
    }

    .option.is-selected {
      border-color: var(--primary);
      background: var(--primary-soft);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.14);
    }

    .option-key {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      color: var(--primary-dark);
      background: #fff;
      border: 1px solid var(--accent-border);
      font-weight: 800;
      font-size: 0.82rem;
    }

    .option.is-selected .option-key {
      color: #fff;
      background: var(--primary);
      border-color: var(--primary);
    }

    .option-text {
      min-width: 0;
    }

    .submit-bar {
      position: fixed;
      right: 0;
      bottom: 0;
      left: 0;
      z-index: 20;
      padding: 14px 0;
      background: rgba(246, 244, 239, 0.92);
      border-top: 1px solid var(--line);
      backdrop-filter: blur(14px);
    }

    .submit-inner {
      display: flex;
      gap: 14px;
      align-items: center;
      justify-content: space-between;
    }

    .progress-note {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .primary-button,
    .secondary-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 10px 18px;
      border-radius: var(--radius);
      border: 1px solid transparent;
      cursor: pointer;
      font-weight: 800;
      transition: background 0.18s ease, border-color 0.18s ease, transform 0.18s ease;
    }

    .primary-button {
      color: #fff;
      background: var(--primary);
    }

    .primary-button:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }

    .secondary-button {
      color: var(--primary-dark);
      background: #fff;
      border-color: var(--line);
    }

    .secondary-button:hover {
      border-color: var(--primary);
      background: var(--primary-soft);
    }

    .form-message {
      margin: 18px 0 0;
      min-height: 28px;
      color: var(--danger);
      font-weight: 700;
    }

    .hidden {
      display: none !important;
    }

    .report {
      padding: 26px 0 56px;
    }

    .report-header {
      display: flex;
      gap: 18px;
      align-items: flex-start;
      justify-content: space-between;
      margin: 0 0 18px;
      padding: 24px;
      border-radius: var(--radius);
      color: #fff;
      background: linear-gradient(135deg, var(--accent-dark), #3b82f6);
      box-shadow: var(--shadow);
    }

    .report-header h2 {
      margin: 0 0 8px;
      font-size: clamp(1.55rem, 3vw, 2.3rem);
      line-height: 1.22;
    }

    .report-header p {
      margin: 0;
      color: rgba(255, 255, 255, 0.86);
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 5px 10px;
      border-radius: 999px;
      color: var(--primary-dark);
      background: var(--primary-soft);
      font-weight: 800;
      font-size: 0.9rem;
    }

    .report-header .tag {
      color: #fff;
      background: rgba(255, 255, 255, 0.18);
    }

    .report-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin-top: 16px;
    }

    .report-card {
      padding: 22px;
    }

    .report-card.full {
      grid-column: 1 / -1;
    }

    .report-card h3 {
      margin: 0 0 12px;
      font-size: 1.18rem;
      line-height: 1.35;
    }

    .report-card p {
      margin: 0 0 10px;
      color: var(--muted);
    }

    .list {
      margin: 0;
      padding-left: 1.2rem;
    }

    .list li {
      margin: 7px 0;
    }

    .score-list {
      display: grid;
      gap: 16px;
    }

    .score-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 7px;
      font-weight: 800;
    }

    .score-value {
      color: var(--primary-dark);
    }

    .bar {
      overflow: hidden;
      height: 12px;
      border-radius: 999px;
      background: #ebe5d9;
    }

    .bar-fill {
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: var(--primary);
    }

    .bar-fill.anxiety {
      background: var(--accent);
    }

    .bar-fill.avoidance {
      background: #1d4ed8;
    }

    .bar-fill.disorganized {
      background: #1e40af;
    }

    .score-caption {
      margin-top: 7px;
      color: var(--muted);
      font-size: 0.94rem;
    }

    .analysis-grid {
      display: grid;
      gap: 12px;
    }

    .analysis-card {
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-soft);
    }

    .analysis-card h4 {
      margin: 0 0 8px;
      color: var(--primary-dark);
      font-size: 1rem;
    }

    .analysis-meta {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .analysis-card p {
      margin: 0;
    }

    .fine-print {
      color: var(--muted);
      font-size: 0.94rem;
    }

    @media (max-width: 760px) {
      .container {
        width: min(100% - 24px, var(--max-width));
      }

      .hero {
        padding-top: 34px;
      }

      .notice,
      .report-grid {
        grid-template-columns: 1fr;
      }

      .options.likert {
        grid-template-columns: 1fr;
      }

      .question-card,
      .report-card {
        padding: 16px;
      }

      .question-title {
        gap: 10px;
      }

      .submit-inner {
        align-items: stretch;
        flex-direction: column;
        gap: 10px;
      }

      .progress-note {
        text-align: center;
      }

      .primary-button,
      .secondary-button {
        width: 100%;
      }

      .report-header {
        flex-direction: column;
        padding: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="hero">
      <div class="container">
        <p class="eyebrow">自评工具</p>
        <h1>成人亲密关系依恋类型测试</h1>
        <p class="subtitle">本测试用于帮助你观察自己在亲密关系中的反应模式。请根据你在恋爱、暧昧、亲密关系或重要关系中的真实反应作答。测试结果用于自我理解和关系观察，不构成医学诊断，也不能替代心理咨询。</p>
        <div class="notice" aria-label="测试说明">
          <div class="notice-item">
            <strong>作答方式</strong>
            <span>请按你在真实亲密关系或暧昧互动中的常见反应作答，不必追求“正确”。</span>
          </div>
          <div class="notice-item">
            <strong>完成时间</strong>
            <span>共 32 题，预计 6-10 分钟。每题都需要选择后才能提交。</span>
          </div>
        </div>
      </div>
    </header>

    <main class="container">
      <section id="testArea" aria-label="测试题目">
        <div id="questionsRoot"></div>
        <p id="formMessage" class="form-message" role="status" aria-live="polite"></p>
      </section>

      <section id="reportArea" class="report hidden" aria-label="测试报告"></section>
    </main>

    <div id="submitBar" class="submit-bar">
      <div class="container submit-inner">
        <div id="progressNote" class="progress-note">已完成 0 / 32 题</div>
        <button id="submitButton" class="primary-button" type="button">提交测试</button>
      </div>
    </div>
  </div>

  <script>
    const questions = [
      {
        id: "q1",
        section: "scale",
        partTitle: "第一部分：关系中的常见反应",
        text: "当对方回复变慢、语气变淡或短时间没有主动联系时，我会明显不安。",
        type: "likert",
        dimension: "anxiety"
      },
      {
        id: "q2",
        section: "scale",
        partTitle: "第一部分：关系中的常见反应",
        text: "关系还没有明确时，我很想知道我们到底算什么。",
        type: "likert",
        dimension: "anxiety"
      },
      {
        id: "q3",
        section: "scale",
        partTitle: "第一部分：关系中的常见反应",
        text: "对方没有及时回应我的需求时，我会觉得自己被冷落或不重要。",
        type: "likert",
        dimension: "anxiety"
      },
      {
        id: "q4",
        section: "scale",
        partTitle: "第一部分：关系中的常见反应",
        text: "我会用反话、试探或赌气来确认对方在不在乎。",
        type: "likert",
        dimension: "anxiety"
      },
      {
        id: "q5",
        section: "scale",
        partTitle: "第一部分：关系中的常见反应",
        text: "关系出现波动时，我容易反复复盘自己是不是哪里做错了。",
        type: "likert",
        dimension: "anxiety"
      },
      {
        id: "q6",
        section: "scale",
        partTitle: "第一部分：关系中的常见反应",
        text: "对方越模糊、越不确定，我越难自然降温。",
        type: "likert",
        dimension: "anxiety"
      },
      {
        id: "q7",
        section: "scale",
        partTitle: "第一部分：关系中的常见反应",
        text: "当关系变得更亲近、更认真时，我会想拉开一点距离。",
        type: "likert",
        dimension: "avoidance"
      },
      {
        id: "q8",
        section: "scale",
        partTitle: "第一部分：关系中的常见反应",
        text: "对方要求明确关系、未来安排或稳定承诺时，我会感到压力。",
        type: "likert",
        dimension: "avoidance"
      },
      {
        id: "q9",
        section: "scale",
        partTitle: "第一部分：关系中的常见反应",
        text: "对方提出情感需求时，我会觉得被要求太多。",
        type: "likert",
        dimension: "avoidance"
      },
      {
        id: "q10",
        section: "scale",
        partTitle: "第一部分：关系中的常见反应",
        text: "发生误会或冲突后，我倾向先沉默、冷处理或让事情过去。",
        type: "likert",
        dimension: "avoidance"
      },
      {
        id: "q11",
        section: "scale",
        partTitle: "第一部分：关系中的常见反应",
        text: "我很怕亲密关系影响自己的自由和个人空间。",
        type: "likert",
        dimension: "avoidance"
      },
      {
        id: "q12",
        section: "scale",
        partTitle: "第一部分：关系中的常见反应",
        text: "我很少表达脆弱、想念、需要或在意。",
        type: "likert",
        dimension: "avoidance"
      },
      {
        id: "q13",
        section: "scenario",
        partTitle: "第二部分：具体情境选择",
        text: "当对方半天没有回复我的消息时，我通常会：",
        type: "choice",
        options: [
          { key: "A", text: "能正常做自己的事，之后自然接上。", scores: { safety: 2 } },
          { key: "B", text: "心里有点在意，但能自己消化。", scores: { safety: 1 } },
          { key: "C", text: "开始反复看手机，猜对方是不是变冷。", scores: { anxiety: 2 } },
          { key: "D", text: "直接冷下来，觉得联系很麻烦，干脆不聊了。", scores: { avoidance: 2 } },
          { key: "E", text: "一边想找对方，一边又觉得自己太需要别人，开始烦躁。", scores: { anxiety: 1, avoidance: 1, disorganized: 2 } }
        ]
      },
      {
        id: "q14",
        section: "scenario",
        partTitle: "第二部分：具体情境选择",
        text: "当对方说“我希望我们能更明确一点”时，我通常会：",
        type: "choice",
        options: [
          { key: "A", text: "认真回应，说明自己的想法和节奏。", scores: { safety: 2 } },
          { key: "B", text: "有点紧张，但愿意继续谈。", scores: { safety: 1 } },
          { key: "C", text: "立刻担心对方是不是要离开，急着表态。", scores: { anxiety: 2 } },
          { key: "D", text: "感到压力，开始说“别想太多，顺其自然”。", scores: { avoidance: 2 } },
          { key: "E", text: "当下想靠近，之后又开始退缩。", scores: { anxiety: 1, avoidance: 1, disorganized: 2 } }
        ]
      },
      {
        id: "q15",
        section: "scenario",
        partTitle: "第二部分：具体情境选择",
        text: "一次亲密见面之后，我通常会：",
        type: "choice",
        options: [
          { key: "A", text: "联系节奏自然延续，也会安排下一次。", scores: { safety: 2 } },
          { key: "B", text: "有好感，但需要一点时间消化。", scores: { safety: 1 } },
          { key: "C", text: "特别想确认对方感觉，怕对方只是玩玩。", scores: { anxiety: 2 } },
          { key: "D", text: "反而想拉开距离，恢复自由感。", scores: { avoidance: 2 } },
          { key: "E", text: "见面时很投入，分开后又开始怀疑和退缩。", scores: { anxiety: 1, avoidance: 1, disorganized: 2 } }
        ]
      },
      {
        id: "q16",
        section: "scenario",
        partTitle: "第二部分：具体情境选择",
        text: "比如对方说：“下次约我提前一天说，我更好安排。”这时我通常会：",
        type: "choice",
        options: [
          { key: "A", text: "觉得合理，之后尽量做到。", scores: { safety: 2 } },
          { key: "B", text: "会解释自己的习惯，也愿意协调。", scores: { safety: 1 } },
          { key: "C", text: "担心自己让对方不满意，马上紧张。", scores: { anxiety: 2 } },
          { key: "D", text: "觉得被管了，开始抗拒。", scores: { avoidance: 2 } },
          { key: "E", text: "当下答应，之后因为压力又做不到。", scores: { anxiety: 1, avoidance: 1, disorganized: 2 } }
        ]
      },
      {
        id: "q17",
        section: "scenario",
        partTitle: "第二部分：具体情境选择",
        text: "当我和对方发生一次小误会时，我通常会：",
        type: "choice",
        options: [
          { key: "A", text: "解释清楚，也听对方感受。", scores: { safety: 2 } },
          { key: "B", text: "先缓一下，之后愿意回来谈。", scores: { safety: 1 } },
          { key: "C", text: "很怕关系变坏，急着解释、道歉、确认。", scores: { anxiety: 2 } },
          { key: "D", text: "觉得麻烦，选择沉默或消失。", scores: { avoidance: 2 } },
          { key: "E", text: "一开始想修复，谈深了又觉得受不了。", scores: { anxiety: 1, avoidance: 1, disorganized: 2 } }
        ]
      },
      {
        id: "q18",
        section: "scenario",
        partTitle: "第二部分：具体情境选择",
        text: "当对方突然变得很热情时，我通常会：",
        type: "choice",
        options: [
          { key: "A", text: "感到开心，也能自然回应。", scores: { safety: 2 } },
          { key: "B", text: "观察一段时间，看行动是否稳定。", scores: { safety: 1 } },
          { key: "C", text: "很快投入，期待关系迅速推进。", scores: { anxiety: 2 } },
          { key: "D", text: "反而警惕，觉得对方靠太近。", scores: { avoidance: 2 } },
          { key: "E", text: "既开心又害怕，想靠近又想退。", scores: { anxiety: 1, avoidance: 1, disorganized: 2 } }
        ]
      },
      {
        id: "q19",
        section: "scenario",
        partTitle: "第二部分：具体情境选择",
        text: "当关系进入稳定期时，我通常会：",
        type: "choice",
        options: [
          { key: "A", text: "觉得安心，愿意持续经营。", scores: { safety: 2 } },
          { key: "B", text: "保持节奏，也保留自己的生活。", scores: { safety: 1 } },

    const answers = {};

    const questionsRoot = document.getElementById("questionsRoot");
    const formMessage = document.getElementById("formMessage");
    const progressNote = document.getElementById("progressNote");
    const submitButton = document.getElementById("submitButton");
    const submitBar = document.getElementById("submitBar");

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function renderQuestions() {
      let html = "";
      let lastTitle = "";

      questions.forEach((question, index) => {
        if (question.partTitle !== lastTitle) {
          html += `
            <div class="section-heading">
              <h2>${escapeHtml(question.partTitle)}</h2>
              <p>${getSectionIntro(question.section)}</p>
            </div>
          `;
          lastTitle = question.partTitle;
        }

        const options = question.type === "likert" ? likertOptions : question.options;
        const optionClass = question.type === "likert" ? "options likert" : "options";
        const optionHtml = options.map((option) => {
          const value = question.type === "likert" ? option.value : option.key;
          return `
            <button class="option" type="button" data-question-id="${question.id}" data-value="${value}" aria-pressed="false">
              <span class="option-key">${escapeHtml(option.key)}</span>
              <span class="option-text">${escapeHtml(option.text)}</span>
            </button>
          `;
        }).join("");

        html += `
          <article class="question-card" id="card-${question.id}" data-question-id="${question.id}">
            <div class="question-title">
              <span class="question-number">${index + 1}</span>
              <div>
                <p class="question-text">${escapeHtml(question.text)}</p>
                ${question.context ? `<p class="question-context">${escapeHtml(question.context)}</p>` : ""}
              </div>
            </div>
            <div class="${optionClass}" role="group" aria-label="${escapeHtml(question.text)}">
              ${optionHtml}
            </div>
          </article>
        `;
      });

      questionsRoot.innerHTML = html;
    }

    function getSectionIntro(section) {
      const intro = {
        scale: "请根据你在亲密关系中的真实反应作答。",
        scenario: "请根据你在这些情境中更接近的真实反应作答。",
        calibration: "请根据你在真实互动中反复出现的后续行为作答，这一部分用于判断关系反应是否稳定。"
      };
      return intro[section] || "";
    }

    function updateProgress() {
      const completed = Object.keys(answers).length;
      progressNote.textContent = `已完成 ${completed} / ${questions.length} 题`;
    }

    function handleOptionClick(event) {
      const button = event.target.closest(".option");
      if (!button) return;

      const questionId = button.dataset.questionId;
      const value = button.dataset.value;
      answers[questionId] = value;

      const card = document.getElementById(`card-${questionId}`);
      card.classList.remove("is-missing");
      card.querySelectorAll(".option").forEach((option) => {
        const selected = option === button;
        option.classList.toggle("is-selected", selected);
        option.setAttribute("aria-pressed", String(selected));
      });

      formMessage.textContent = "";
      updateProgress();
    }

    function validateAnswers() {
      document.querySelectorAll(".question-card").forEach((card) => card.classList.remove("is-missing"));
      const missing = questions.find((question) => answers[question.id] === undefined);

      if (missing) {
        const missingCard = document.getElementById(`card-${missing.id}`);
        missingCard.classList.add("is-missing");
        formMessage.textContent = `还有题目未完成，请先回答第 ${questions.indexOf(missing) + 1} 题。`;
        missingCard.scrollIntoView({ behavior: "smooth", block: "center" });
        return false;
      }

      return true;
    }

    function getSelectedOption(question) {
      if (question.type === "likert") {
        return likertOptions.find((option) => String(option.value) === String(answers[question.id]));
      }
      return question.options.find((option) => option.key === answers[question.id]);
    }

    function calculateScores() {
      const raw = {
        scaleAnxiety: 0,
        scaleAvoidance: 0,
        scenarioSafety: 0,
        scenarioAnxiety: 0,
        scenarioAvoidance: 0,
        scenarioDisorganized: 0,
        adjustAnxiety: 0,
        adjustAvoidance: 0,
        adjustDisorganized: 0,
        safetySignals: 0,
        gentleNotes: []
      };

      questions.forEach((question) => {
        const selected = getSelectedOption(question);

        if (question.section === "scale") {
          const value = Number(answers[question.id]);
          if (question.dimension === "anxiety") raw.scaleAnxiety += value;
          if (question.dimension === "avoidance") raw.scaleAvoidance += value;
        }

        if (question.section === "scenario") {
          const scores = selected.scores || {};
          raw.scenarioSafety += scores.safety || 0;
          raw.scenarioAnxiety += scores.anxiety || 0;
          raw.scenarioAvoidance += scores.avoidance || 0;
          raw.scenarioDisorganized += scores.disorganized || 0;
        }

        if (question.section === "calibration") {
          const effects = selected.effects || {};
          raw.adjustAnxiety += effects.anxiety || 0;
          raw.adjustAvoidance += effects.avoidance || 0;
          raw.adjustDisorganized += effects.disorganized || 0;
          raw.safetySignals += effects.safety || 0;

          if (effects.anxietyNote) {
            raw.gentleNotes.push("有轻度焦虑反应，但你仍保留了一定自我调节能力。");
          }
          if (selected.signal) raw.gentleNotes.push(selected.signal);
        }
      });

      const finalAnxiety = Math.max(0, raw.scaleAnxiety + raw.scenarioAnxiety * 0.6 + raw.adjustAnxiety);
      const finalAvoidance = Math.max(0, raw.scaleAvoidance + raw.scenarioAvoidance * 0.6 + raw.adjustAvoidance);
      const finalSafety = Math.max(0, raw.scenarioSafety + raw.safetySignals);
      const finalDisorganized = Math.max(0, raw.scenarioDisorganized + raw.adjustDisorganized + Math.min(finalAnxiety, finalAvoidance) * 0.3);

      return {
        ...raw,
        finalAnxiety: roundOne(finalAnxiety),
        finalAvoidance: roundOne(finalAvoidance),
        finalSafety: roundOne(finalSafety),
        finalDisorganized: roundOne(finalDisorganized)
      };
    }

    function roundOne(value) {
      return Math.round(value * 10) / 10;
    }

    function determineType(scores) {
      const anxiety = scores.finalAnxiety;
      const avoidance = scores.finalAvoidance;
      const safety = scores.finalSafety;
      const disorganized = scores.finalDisorganized;

      if (anxiety < 7 && avoidance < 7 && safety >= 8 && disorganized < 5) {
        return buildTypeResult("secure", "安全信号较稳定，焦虑和回避反应都不高。");
      }

      if ((anxiety >= 8 && avoidance >= 8) || disorganized >= 8) {
        return buildTypeResult("disorganized", "焦虑与回避同时较高，或亲近和退缩交替的信号较明显。");
      }

      if (anxiety >= 9 && avoidance < 8 && disorganized < 8) {
        return buildTypeResult("anxious", "确认需求和关系信号敏感度更突出。");
      }

      if (avoidance >= 9 && anxiety < 8 && disorganized < 8) {
        return buildTypeResult("avoidant", "亲近、承诺或需求出现时的压力反应更突出。");
      }

      if (anxiety - avoidance > 2) {
        return buildTypeResult("anxious", "焦虑分高于回避分 2 分以上，呈现焦虑为主、伴随回避防御的混合表现。", "焦虑为主，伴随回避防御");
      }

      if (avoidance - anxiety > 2) {
        return buildTypeResult("avoidant", "回避分高于焦虑分 2 分以上，呈现回避为主、伴随焦虑触发的混合表现。", "回避为主，伴随焦虑触发");
      }

      return buildTypeResult("mixed", "焦虑和回避分数接近，尚未形成单一清晰类型。", "混合倾向，建议继续观察");
    }

    function buildTypeResult(key, reason, secondaryLabel) {
      return {
        key,
        reason,
        secondary: secondaryLabel || getDefaultSecondary(key),
        ...typeContent[key]
      };
    }

    function getDefaultSecondary(key) {
      const labels = {
        secure: "安全信号为主，保留对关系质量的观察",
        anxious: "焦虑倾向为主，需观察是否伴随退缩防御",
        avoidant: "回避倾向为主，需观察是否伴随不安触发",
        disorganized: "亲近渴望和退缩防御都需要被看见",
        mixed: "反应模式受对象、阶段和压力状态影响较大"
      };
      return labels[key];
    }

    function buildAdjustmentSummary(scores) {
      const notes = [];

      if (scores.safetySignals >= 6) {
        notes.push("后续行为中出现较多安全信号：能解释、能回应、能修复，说明部分看似冷淡或慢热的表现可能只是节奏和表达方式差异。");
      }

      if (scores.adjustAvoidance >= 4) {
        notes.push("后续行为中多次出现回避相关信号：需求后降温、冲突后不修复、推进模糊或行动不足。");
      } else if (scores.adjustAvoidance <= -2) {
        notes.push("后续行为降低了回避判断：慢热、话少或回复慢并不必然等于逃避，关键要看是否有稳定行动。");
      }

      if (scores.adjustAnxiety >= 3) {
        notes.push("后续行为中确认需求较明显：反复确认、试探或期待快速明确关系可能会放大不确定感。");
      }

      if (scores.adjustDisorganized >= 2) {
        notes.push("后续行为中出现靠近后退、冷热切换或想解释又拒绝解释的模式，混乱指数因此上升。");
      }

      if (!notes.length) {
        notes.push("后续行为没有明显改变主要结果，说明基础反应和具体情境选择之间相对一致。");
      }

      return notes;
    }

            <p><strong>主要倾向：</strong>${escapeHtml(typeResult.name)}</p>
            <p><strong>次要倾向：</strong>${escapeHtml(typeResult.secondary)}</p>
            <p><strong>判断说明：</strong>${escapeHtml(typeResult.reason)}</p>
          </section>

          <section class="report-card full">
            <h3>分数概览</h3>
            <div class="score-list">
              ${scoreRows.map((row) => renderScoreRow(row)).join("")}
            </div>
          </section>

          <section class="report-card">
            <h3>典型表现</h3>
            ${renderList(typeResult.performances)}
          </section>

          <section class="report-card">
            <h3>可能形成原因</h3>
            <p>以下内容用于理解关系反应模式，不代表确定性诊断。</p>
            ${renderList(typeResult.causes)}
          </section>

          <section class="report-card">
            <h3>主要风险点</h3>
            ${renderList(typeResult.risks)}
          </section>

          <section class="report-card">
            <h3>相处建议</h3>
            ${renderList(typeResult.suggestions)}
          </section>

          <section class="report-card full">
            <h3>题目关联分析</h3>
            <div class="analysis-grid">
              ${analysisItems.map(renderAnalysisItem).join("")}
            </div>
          </section>

          <section class="report-card full">
            <h3>后续行为补充</h3>
            ${renderList(adjustmentSummary)}
          </section>

          <section class="report-card full">
            <h3>观察补充</h3>
            <p>这份测试更适合用于观察关系中的反应模式。依恋倾向会受到关系对象、人生阶段、压力状态和既往经验影响。建议结合 2-4 周真实互动继续观察。</p>
            <p class="fine-print">如果你在关系中长期感到强烈痛苦、失控或无法停止反复拉扯，建议寻求专业心理咨询支持。</p>
          </section>
        </div>
      `;

      document.getElementById("resetButton").addEventListener("click", resetTest);
    }

    function renderScoreRow(row) {
      const percent = Math.max(0, Math.min(100, (row.value / row.max) * 100));
      return `
        <div>
          <div class="score-head">
            <span>${escapeHtml(row.label)}</span>
            <span class="score-value">${row.value.toFixed(1)}</span>
          </div>
          <div class="bar" aria-hidden="true">
            <div class="bar-fill ${row.key}" style="width: ${percent}%"></div>
          </div>
          <div class="score-caption">${escapeHtml(getScoreCaption(row.key, row.value))}</div>
        </div>
      `;
    }

    function renderList(items) {
      return `<ul class="list">${items.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul>`;
    }

    function renderAnalysisItem(item) {
      return `
        <article class="analysis-card">
          <h4>${escapeHtml(item.title)}</h4>
          <p class="analysis-meta">关联题目：${escapeHtml(item.refs)}</p>
          <p>${escapeHtml(item.text)}</p>
          <p class="analysis-meta">对结果的影响：${escapeHtml(item.impact)}</p>
        </article>
      `;
    }

    function submitTest() {
      if (!validateAnswers()) return;

      const scores = calculateScores();
      const typeResult = determineType(scores);
      const analysisItems = buildRelationAnalysis(scores);

      renderReport(scores, typeResult, analysisItems);
      testArea.classList.add("hidden");
      submitBar.classList.add("hidden");
      reportArea.classList.remove("hidden");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function resetTest() {
      Object.keys(answers).forEach((key) => delete answers[key]);
      document.querySelectorAll(".option").forEach((option) => {
        option.classList.remove("is-selected");
        option.setAttribute("aria-pressed", "false");
      });
      document.querySelectorAll(".question-card").forEach((card) => card.classList.remove("is-missing"));
      formMessage.textContent = "";
      reportArea.classList.add("hidden");
      reportArea.innerHTML = "";
      testArea.classList.remove("hidden");
      submitBar.classList.remove("hidden");
      updateProgress();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    renderQuestions();
    updateProgress();
    questionsRoot.addEventListener("click", handleOptionClick);
    submitButton.addEventListener("click", submitTest);
  </script>
</body>
</html>
